# electron-builder config — produces per-OS installers bundling the
# Vue SPA + Electron + Go backend binary.
#
# Build flow (per platform):
#   1. `make backend-build-<os>-<arch>` cross-compiles the Go binary to
#      backend/bin/<os>-<arch>/gotutor-backend
#   2. `pnpm --dir frontend build` produces frontend/dist/
#   3. `pnpm --dir electron build` compiles TS → electron/dist/
#   4. `pnpm --dir electron package` runs electron-builder which:
#        - copies frontend/dist/ and electron/dist/ into the app
#        - copies the matching backend binary into Resources/backend/
#        - bundles Electron itself and produces a dmg/exe/AppImage
#
# At runtime the Electron main process finds the binary at
# process.resourcesPath/backend/<name> (see backend.ts).

appId: dev.teahouse.gotutor
productName: GoTutor
copyright: Copyright © 2026 TeaHouse

# Relative to electron/ — both must already exist when electron-builder runs.
directories:
  output: ../release
  buildResources: build

# What goes into the asar. electron/dist (compiled TS) + package.json.
# Note: we canNOT use `../frontend/dist/**` here — electron-builder
# rejects paths with `..` for security. The frontend ships via
# extraResources below instead.
files:
  - dist/**
  - package.json

# Sidecars that don't belong inside the asar — they're read by the main
# process via process.resourcesPath at runtime.
#
# - backend:  Go binary, cross-compiled per os/arch.
# - frontend: built Vue SPA. Loaded by main.ts via loadFile from
#             <resourcesPath>/frontend/dist/index.html.
extraResources:
  - from: ../backend/bin/${os}-${arch}/
    to: backend/
    filter:
      - '**/*'
  - from: ../frontend/dist/
    to: frontend/dist/
    filter:
      - '**/*'

mac:
  target:
    - { target: dmg, arch: arm64 }
    - { target: dmg, arch: x64 }
  category: public.app-category.education
  hardenedRuntime: false
  gatekeeperAssess: false

win:
  target:
    - { target: nsis, arch: x64 }
  artifactName: GoTutor-${version}-${arch}.${ext}

linux:
  target:
    - AppImage
    - deb
  category: Education
  maintainer: TeaHouse

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
