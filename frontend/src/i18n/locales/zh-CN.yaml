# === Phase 2: first-run experience + Go-missing recovery ===
boot:
  loading: 正在启动 GoTutor…
welcome:
  title: 欢迎来到 GoTutor
  subtitle: 给 AI 时代开发者的 Go 肌肉记忆训练馆
  body: |
    你已经会写代码——也许还经常让 AI 帮你写。
    但当 AI 给你一段 Go，你能一眼看出它写得地道吗?
    GoTutor 不教你「什么是变量」。它让你亲手敲出真实项目里的地道写法：
    填空、跑测试、肌肉记忆就长出来了。
  step_1: 1. 打开一个章节——每章都是真实小项目，里面有几个 // TODO 标记等你填
  step_2: 2. 敲代码，运行测试——不是字符串比对，是真的 go test 跑你的代码
  step_3: 3. 卡住了就点「需要提示？」——提示告诉你为什么这么写，不是直接给答案
  cta: 开始第一章
  skip: 跳过，我自己看
  reopen_label: 帮助
go_missing:
  title: 还差一步——需要先装 Go
  body_1: GoTutor 用真正的 go test 跑你的代码，所以本机需要有 Go 工具链。
  body_2: 装好后回到这里，点下面的按钮，几秒钟就能开始。
  install_mac:
    label: macOS 安装
    step_1: 用 Homebrew（推荐）：
    step_2: 或下载官方安装包：
    download: 下载 Go 安装包
  install_windows:
    label: Windows 安装
    step_1: 下载官方安装包（.msi）：
    download: 下载 Go 安装包
    step_2: 双击运行，一路下一步
  install_linux:
    label: Linux 安装
    step_1: 从官网下载 tarball：
    download: 下载 Go tarball
    step_2: 解压到 /usr/local/go 并把 /usr/local/go/bin 加到 PATH
  recheck: 我装好了，重新检测
  rechecking: 检测中…
  why_go: 为什么需要 Go？
  why_go_body: GoTutor 把你的代码写进临时文件，调用真正的 go test 跑测试。和在线 playground 不同——你要在自己的机器上练，肌肉记忆才能长出来。
backend_down:
  title: 后台服务没起来
  body: GoTutor 的后台进程没响应。这通常是首次启动慢或者被防火墙拦了。
  retry: 重试
  log_hint: 如果一直失败，日志写在
