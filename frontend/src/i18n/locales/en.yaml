# === Phase 2: first-run experience + Go-missing recovery ===
boot:
  loading: Starting GoTutor…
welcome:
  title: Welcome to GoTutor
  subtitle: A muscle-memory gym for AI-era developers
  body: |
    You already know how to code — maybe you even let AI write a lot of it.
    But when AI hands you a chunk of Go, can you tell at a glance if it's idiomatic?
    GoTutor doesn't teach you "what a variable is." It makes your hands type
    out the patterns real Go projects use: fill the blanks, run the tests,
    and the muscle memory takes care of itself.
  step_1: 1. Open a chapter — each one is a real mini-project with a few // TODO markers waiting for you
  step_2: 2. Type, then run the tests — not string matching, real go test against your code
  step_3: 3. Stuck? Click "Need a hint?" — hints coach you on the why, not the answer
  cta: Start the first chapter
  skip: Skip — I'll explore on my own
  reopen_label: Help
go_missing:
  title: One more step — Go needs to be installed
  body_1: GoTutor runs your code through real go test, so the Go toolchain must be on this machine.
  body_2: Once it's installed, come back here and click the button below — you'll be coding in seconds.
  install_mac:
    label: Install on macOS
    step_1: 'With Homebrew (recommended):'
    step_2: 'Or download the official installer:'
    download: Download Go installer
  install_windows:
    label: Install on Windows
    step_1: 'Download the official installer (.msi):'
    download: Download Go installer
    step_2: Double-click and follow the wizard
  install_linux:
    label: Install on Linux
    step_1: 'Grab the tarball from the official site:'
    download: Download Go tarball
    step_2: Extract to /usr/local/go and add /usr/local/go/bin to PATH
  recheck: I've installed it — check again
  rechecking: Checking…
  why_go: Why does GoTutor need Go?
  why_go_body: GoTutor writes your code to a temp file and calls real go test against it. Unlike an online playground — you practice on your own machine, that's how the muscle memory sticks.
backend_down:
  title: Backend service isn't responding
  body: GoTutor's backend process isn't answering. Usually that's a slow first launch or a firewall block.
  retry: Retry
  log_hint: If it keeps failing, logs are written to
